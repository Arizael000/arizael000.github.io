<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <rect width="600" height="380" fill="#1a3a3c" rx="8"/>
  <text x="300" y="50" text-anchor="middle" fill="#7fccd0" font-family="Arial,sans-serif" font-size="18" font-weight="bold">Logistics Dashboard</text>
  <!-- KPI row -->
  <rect x="25" y="65" width="170" height="70" rx="6" fill="#2d4f52"/>
  <text x="110" y="90" text-anchor="middle" fill="#7fccd0" font-family="Arial,sans-serif" font-size="11">Shipments</text>
  <text x="110" y="115" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="18" font-weight="bold">5,832</text>
  <rect x="215" y="65" width="170" height="70" rx="6" fill="#2d4f52"/>
  <text x="300" y="90" text-anchor="middle" fill="#7fccd0" font-family="Arial,sans-serif" font-size="11">On-Time %</text>
  <text x="300" y="115" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="18" font-weight="bold">94.2%</text>
  <rect x="405" y="65" width="170" height="70" rx="6" fill="#2d4f52"/>
  <text x="490" y="90" text-anchor="middle" fill="#7fccd0" font-family="Arial,sans-serif" font-size="11">Delay Avg</text>
  <text x="490" y="115" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="18" font-weight="bold">1.3 d</text>
  <!-- Map placeholder (route visualization) -->
  <rect x="25" y="150" width="350" height="170" rx="6" fill="#2d4f52"/>
  <circle cx="100" cy="220" r="6" fill="#457a7e"/>
  <circle cx="280" cy="260" r="6" fill="#457a7e"/>
  <circle cx="180" cy="190" r="6" fill="#7fccd0"/>
  <line x1="100" y1="220" x2="180" y2="190" stroke="#457a7e" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="180" y1="190" x2="280" y2="260" stroke="#457a7e" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="100" y1="220" x2="280" y2="260" stroke="#457a7e" stroke-width="1.5" stroke-dasharray="3 4"/>
  <rect x="100" y="170" width="4" height="100" rx="2" fill="#7fccd0" opacity="0.15"/>
  <rect x="180" y="170" width="4" height="50" rx="2" fill="#7fccd0" opacity="0.15"/>
  <rect x="280" y="170" width="4" height="110" rx="2" fill="#7fccd0" opacity="0.15"/>
  <rect x="36" y="285" width="10" height="10" rx="2" fill="#457a7e"/>
  <text x="50" y="295" fill="#b8d0d2" font-family="Arial,sans-serif" font-size="10">Warehouse</text>
  <circle cx="120" cy="290" r="4" fill="#7fccd0"/>
  <text x="130" y="295" fill="#b8d0d2" font-family="Arial,sans-serif" font-size="10">Hub</text>
  <!-- KPI side cards -->
  <rect x="390" y="150" width="185" height="50" rx="6" fill="#2d4f52"/>
  <text x="482" y="172" text-anchor="middle" fill="#7fccd0" font-family="Arial,sans-serif" font-size="10">In Transit</text>
  <text x="482" y="192" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="16" font-weight="bold">214</text>
  <rect x="390" y="210" width="185" height="50" rx="6" fill="#2d4f52"/>
  <text x="482" y="232" text-anchor="middle" fill="#7fccd0" font-family="Arial,sans-serif" font-size="10">Delivered Today</text>
  <text x="482" y="252" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="16" font-weight="bold">342</text>
  <rect x="390" y="270" width="185" height="50" rx="6" fill="#2d4f52"/>
  <text x="482" y="292" text-anchor="middle" fill="#7fccd0" font-family="Arial,sans-serif" font-size="10">Pending</text>
  <text x="482" y="312" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="16" font-weight="bold">67</text>
  <!-- Bottom bar -->
  <rect x="25" y="335" width="550" height="30" rx="6" fill="#2d4f52"/>
  <rect x="25" y="335" width="412" height="30" rx="6" fill="#457a7e" opacity="0.6"/>
  <text x="300" y="355" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="12" font-weight="bold">On-Time Delivery: 94.2%</text>
</svg>